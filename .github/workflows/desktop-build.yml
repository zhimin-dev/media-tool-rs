name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - desktop/**
      - src/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/desktop-build.yml

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact: macos-bundle
            bundlePath: desktop/src-tauri/target/release/bundle/macos/**
          - platform: ubuntu-22.04
            artifact: linux-bundle
            bundlePath: desktop/src-tauri/target/release/bundle/appimage/**
          - platform: windows-latest
            artifact: windows-bundle
            bundlePath: desktop/src-tauri/target/release/bundle/nsis/**

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build desktop bundle
        working-directory: desktop
        run: npm run tauri build

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bundlePath }}
          if-no-files-found: error
